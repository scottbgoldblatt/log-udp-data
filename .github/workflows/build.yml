name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Ensure MSVC environment (cl.exe) is active
      - name: MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Get Ninja (optional; windows-latest often has it, but this guarantees it)
      - name: Install Ninja
        run: choco install ninja -y

      # Clone vcpkg at a known commit (match your builtin-baseline ideally)
      # inside your windows job steps
      - name: Clone vcpkg at pinned commit
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:GITHUB_WORKSPACE\vcpkg
          cd $env:GITHUB_WORKSPACE\vcpkg
          git checkout c01dc6ea7353758f2ed70df0bc29c97dfc650b3a
          .\bootstrap-vcpkg.bat

      - name: vcpkg install (manifest mode)
        shell: pwsh
        run: |
          $vcpkg = "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe"
          & $vcpkg install --triplet x64-windows-static --manifest

      - name: Configure (MSVC + Ninja)
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -- -v

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: hrg_logger-windows
          path: build\hrg_logger.exe
